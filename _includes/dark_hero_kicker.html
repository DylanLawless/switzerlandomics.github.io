<section class="dark-background-area dark-background-area--media-stack">
  <div class="container dark-background-area__inner">

    <div class="dark-background-area__media">
      <div class="quant-hist-wrap" aria-hidden="true">
        <br>
        <svg id="quant-hist-svg" viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg" width="100%" style="max-width:256px;display:block;margin:0 auto;">
          <line x1="20" y1="10" x2="20" y2="128" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
          <line x1="20" y1="128" x2="188" y2="128" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
          <g id="quant-hist-bars"></g>
        </svg>
      </div>
    </div>

    <div class="dark-background-area__content">
      <!-- <p class="dark-background-area__kicker">Scientific foundation</p> -->
      <h2>DNA sequence to decision-grade evidence.</h2>
      <p>
        Our systems preserve the evidence, uncertainty, and provenance behind omics-based conclusions,
        so results can be trusted, reviewed, reused, and transferred across real-world workflows.
      </p>
    </div>

  </div>
</section>

<script>
(function () {
  var barsGroup = document.getElementById('quant-hist-bars');
  if (!barsGroup) return;

  var n = 13;
  var barW = 11;
  var gap = 3;
  var maxH = 106;
  var baseY = 128;
  var startX = 22;
  var sigma = 2.6;
  var mu = (n - 1) / 2;
  var fill = 'rgba(255,255,255,0.82)';

  var bars = [];
  for (var i = 0; i < n; i++) {
    var rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    var x = startX + i * (barW + gap);
    var h = Math.exp(-0.5 * Math.pow((i - mu) / sigma, 2)) * maxH;
    rect.setAttribute('x', x);
    rect.setAttribute('y', baseY - h);
    rect.setAttribute('width', barW);
    rect.setAttribute('height', h);
    rect.setAttribute('fill', fill);
    rect.setAttribute('rx', '1.5');
    barsGroup.appendChild(rect);
    bars.push(rect);
  }

  var t = 0;
  var speed = 0.006;
  var travel = 3.8;

  function gauss(i, m) {
    return Math.exp(-0.5 * Math.pow((i - m) / sigma, 2));
  }

  function frame() {
    t += speed;
    var muT = mu + Math.sin(t) * travel;
    for (var i = 0; i < n; i++) {
      var h = Math.max(2, gauss(i, muT) * maxH);
      bars[i].setAttribute('y', baseY - h);
      bars[i].setAttribute('height', h);
    }
    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
})();
</script>
